name: CI - Projeto Desconto (Spring Boot)

# Quando executar?
on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]

# O que fazer?
jobs:
  build-and-test:
    # Máquina virtual onde vai rodar
    runs-on: ubuntu-latest
    
    steps:
    # 1. Baixar o código do GitHub
    - name: Checkout do código
      uses: actions/checkout@v4
    
    # 2. Configurar o Java
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 3. Cache do Maven (não baixa dependências toda vez)
    - name: Cache do Maven
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    # 4. Compilar, testar e gerar o JAR
    - name: Build e testes com Maven
      run: |
        chmod +x mvnw
        ./mvnw clean verify
    
    # 5. Salvar o JAR como artefato (opcional)
    - name: Upload do JAR gerado
      uses: actions/upload-artifact@v4
      with:
        name: desconto-app
        path: target/*.jar